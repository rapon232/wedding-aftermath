<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — #LoveWins. The Aftermath</title>
  <meta name="theme-color" content="#7b2d42" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <link rel="stylesheet" href="/fonts/fonts.css" />
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <main class="login-wrap">
    <div class="login-card">
      <div class="pill-tag">Our favorite people</div>
      <h1 class="login-title">#LoveWins. <span class="nowrap"><em>The Aftermath</em> <span class="heart">♥</span></span></h1>
      <p class="login-sub">Enter your personal access code to see and share the vibess 🌴</p>
      <form id="loginForm" autocomplete="off">
        <input
          id="codeInput"
          class="code-input"
          type="text"
          inputmode="text"
          autocapitalize="characters"
          spellcheck="false"
          placeholder="XXXX-XXXX"
          maxlength="9"
          aria-label="Access code"
        />
        <p id="loginError" class="login-error" hidden></p>
        <button type="submit" class="btn btn-bx" id="loginBtn">Enter the gallery</button>
      </form>
      <p class="login-help">Lost your code? DependeDeGroom&nbsp;♥</p>
    </div>
  </main>
  <script type="module" src="/src/login.js"></script>
</body>
</html>
